<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cheata.Dev portfolio website">
  <title>Cheata.Dev | Portfolio</title>
  <link rel="icon" type="image/webp" href="images/logo.webp">
  <link rel="shortcut icon" type="image/webp" href="images/logo.webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-icons" aria-hidden="true">
    <span class="float-icon fi-1">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 5h16v10H4V5Zm0 12h16" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </span>
    <span class="float-icon fi-2">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m13 3-8 10h6l-1 8 9-12h-6l0-6Z" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </span>
    <span class="float-icon fi-3">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 19c4-1 7-4 8-8l1-6 5 5-6 1c-4 1-7 4-8 8Zm0 0 3-3" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </span>
    <span class="float-icon fi-4">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M9.5 8A4.5 4.5 0 1 1 14 12.5c-1 0-2 .7-2 1.7v.3m0 3h.01" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </span>
    <span class="float-icon fi-5">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 7h16M7 4v6m10-6v6M4 17h16M7 14v6m10-6v6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
    </span>
    <span class="float-icon fi-6">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m14.8 6.4 2.8-2.8 2.8 2.8-2.8 2.8-2.8-2.8ZM3 21l5.8-1.3L19 9.5 14.5 5 4.3 15.2 3 21Z" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </span>
  </div>

  <header class="header">
    <div class="container nav-wrap">
      <button
        id="menu-toggle"
        class="menu-toggle"
        type="button"
        aria-label="Open menu"
        aria-expanded="false"
        aria-controls="site-nav"
      >
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>

      <a href="#home" class="logo">
        <span class="logo-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none"><path d="M12 3 4 7v5c0 5.2 3.5 8.2 8 9 4.5-.8 8-3.8 8-9V7l-8-4Z" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 12.5 11 14l4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
        <span id="logo-text">Cheata.Dev</span>
      </a>

      <nav id="site-nav" class="site-nav">
        <ul class="nav-list">
          <li><a id="nav-home" href="#home">Home</a></li>
          <li><a id="nav-projects" href="#projects">Projects</a></li>
          <li><a id="nav-about" href="#about">About</a></li>
          <li>
            <button id="language-toggle" class="theme-btn language-toggle" type="button" aria-label="Change language">
              <span id="language-toggle-text" class="language-toggle-text">ខ្មែរ</span>
            </button>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <button id="nav-overlay" class="nav-overlay" type="button" aria-label="Close menu"></button>

  <main>
    <section id="home" class="hero container section">
      <div class="profile-box">
        <img src="images/cheata.jpg" alt="Cheata Profile" class="profile-img" id="hero-image-alt">
        <button id="language-toggle-mobile" class="mobile-lang-btn language-toggle" type="button" aria-label="Change language">
          <span id="language-toggle-mobile-text" class="language-toggle-text">ភាសាខ្មែរ</span>
        </button>
      </div>

      <div class="hero-content">
        <h1 id="hero-title"></h1>
        <p id="hero-intro-1"></p>
        <p id="hero-intro-2"></p>

        <div class="cta-row">
          <a href="#contact" class="btn btn-primary" id="btn-contact"></a>
          <a href="#about" class="btn btn-outline" id="btn-about"></a>
        </div>
      </div>
    </section>

    <section id="projects" class="container section">
      <h2 id="projects-title"></h2>
      <p class="section-desc" id="projects-desc"></p>

      <div class="projects-grid" id="projects-grid"></div>
    </section>

    <section id="about" class="container section">
      <h2 id="about-title"></h2>
      <div class="info-box">
        <p id="about-p1"></p>
        <p id="about-p2"></p>
        <p id="about-p3"></p>

        <ul class="profile-info" id="profile-info"></ul>
      </div>
    </section>

    <section id="contact" class="container section">
      <h2 id="contact-title"></h2>
      <div class="info-box">
        <p id="contact-desc"></p>
        <ul class="contact-details" id="contact-details"></ul>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p id="footer-text"></p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
